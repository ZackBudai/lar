<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780">
  <rect width="1400" height="780" fill="white"/>
  <text x="700" y="34" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700">Baseline vs Improved Benchmark Overview</text>
  <text x="700" y="58" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#444">All bars are normalized to the baseline = 100%</text>

  <rect x="20" y="80" width="900" height="670" rx="14" fill="#fbfbfb" stroke="#d9d9d9"/>
  <text x="40" y="110" font-family="sans-serif" font-size="18" font-weight="700">Per-case runtime as % of baseline</text>
  <rect x="40" y="130" width="18" height="10" fill="#8aa6c1"/>
  <text x="64" y="139" font-family="sans-serif" font-size="12">Baseline</text>
  <rect x="140" y="130" width="18" height="10" fill="#d97b55"/>
  <text x="164" y="139" font-family="sans-serif" font-size="12">Improved</text>

  <text x="40" y="170" font-family="sans-serif" font-size="12" fill="#666">Case</text>
  <text x="220" y="170" font-family="sans-serif" font-size="12" fill="#666">0%</text>
  <text x="680" y="170" font-family="sans-serif" font-size="12" fill="#666">100%</text>
  <line x1="220" y1="175" x2="740" y2="175" stroke="#cfcfcf"/>

  <g font-family="sans-serif" font-size="12">
    <text x="40" y="210">modus_ponens</text>
    <rect x="220" y="196" width="520" height="16" fill="#d7d7d7"/>
    <rect x="220" y="196" width="385" height="16" fill="#d97b55"/>
    <text x="752" y="208">74.0%</text>

    <text x="40" y="265">not_entailed_simple</text>
    <rect x="220" y="251" width="520" height="16" fill="#d7d7d7"/>
    <rect x="220" y="251" width="54" height="16" fill="#d97b55"/>
    <text x="752" y="263">10.4%</text>

    <text x="40" y="320">family_transitive</text>
    <rect x="220" y="306" width="520" height="16" fill="#d7d7d7"/>
    <rect x="220" y="306" width="119" height="16" fill="#d97b55"/>
    <text x="752" y="318">22.9%</text>

    <text x="40" y="375">ancestor_recursive</text>
    <rect x="220" y="361" width="520" height="16" fill="#d7d7d7"/>
    <rect x="220" y="361" width="35" height="16" fill="#d97b55"/>
    <text x="752" y="373">6.8%</text>

    <text x="40" y="430">likes_exists</text>
    <rect x="220" y="416" width="520" height="16" fill="#d7d7d7"/>
    <rect x="220" y="416" width="578" height="16" fill="#d97b55"/>
    <text x="752" y="428">111.0%</text>

    <text x="40" y="485">query_with_function</text>
    <rect x="220" y="471" width="520" height="16" fill="#d7d7d7"/>
    <rect x="220" y="471" width="600" height="16" fill="#d97b55"/>
    <text x="752" y="483">115.2%</text>

    <text x="40" y="540">bird_penguin</text>
    <rect x="220" y="526" width="520" height="16" fill="#d7d7d7"/>
    <rect x="220" y="526" width="180" height="16" fill="#d97b55"/>
    <text x="752" y="538">34.6%</text>

    <text x="40" y="595">independent_predicates</text>
    <rect x="220" y="581" width="520" height="16" fill="#d7d7d7"/>
    <rect x="220" y="581" width="236" height="16" fill="#d97b55"/>
    <text x="752" y="593">45.4%</text>

    <text x="40" y="650">chain_depth_4</text>
    <rect x="220" y="636" width="520" height="16" fill="#d7d7d7"/>
    <rect x="220" y="636" width="0.4" height="16" fill="#d97b55"/>
    <text x="752" y="648">0.1%</text>

    <text x="40" y="705">non_entailed_chain</text>
    <rect x="220" y="691" width="520" height="16" fill="#d7d7d7"/>
    <rect x="220" y="691" width="520" height="16" fill="#d97b55"/>
    <text x="752" y="703">100.1%</text>
  </g>

  <rect x="950" y="80" width="430" height="670" rx="14" fill="#fbfbfb" stroke="#d9d9d9"/>
  <text x="970" y="110" font-family="sans-serif" font-size="18" font-weight="700">Aggregate normalized comparison</text>
  <text x="970" y="140" font-family="sans-serif" font-size="12" fill="#666">Baseline is fixed at 100% in each row.</text>

  <rect x="970" y="165" width="18" height="10" fill="#8aa6c1"/>
  <text x="994" y="174" font-family="sans-serif" font-size="12">Baseline</text>
  <rect x="1060" y="165" width="18" height="10" fill="#d97b55"/>
  <text x="1084" y="174" font-family="sans-serif" font-size="12">Improved</text>

  <g font-family="sans-serif" font-size="13">
    <text x="970" y="220">Average time</text>
    <rect x="1120" y="206" width="220" height="16" fill="#d7d7d7"/>
    <rect x="1120" y="206" width="160" height="16" fill="#d97b55"/>
    <text x="1350" y="218">72.6%</text>

    <text x="970" y="290">Median time</text>
    <rect x="1120" y="276" width="220" height="16" fill="#d7d7d7"/>
    <rect x="1120" y="276" width="55" height="16" fill="#d97b55"/>
    <text x="1350" y="288">24.8%</text>

    <text x="970" y="360">Clauses generated</text>
    <rect x="1120" y="346" width="220" height="16" fill="#d7d7d7"/>
    <rect x="1120" y="346" width="113" height="16" fill="#d97b55"/>
    <text x="1350" y="358">51.4%</text>
  </g>

  <line x1="1120" y1="245" x2="1340" y2="245" stroke="#cfcfcf"/>
  <line x1="1120" y1="315" x2="1340" y2="315" stroke="#cfcfcf"/>
  <line x1="1120" y1="385" x2="1340" y2="385" stroke="#cfcfcf"/>

  <text x="970" y="450" font-family="sans-serif" font-size="14" font-weight="700">Reported exact values</text>
  <text x="970" y="478" font-family="sans-serif" font-size="12">Average time: 0.8285 s vs 0.6009 s</text>
  <text x="970" y="500" font-family="sans-serif" font-size="12">Median time: 0.001059 s vs 0.000263 s</text>
  <text x="970" y="522" font-family="sans-serif" font-size="12">Clauses generated: 39,359 vs 20,233</text>
  <text x="970" y="556" font-family="sans-serif" font-size="12" fill="#555">This overview combines the case-level and aggregate comparison into one compact figure.</text>
</svg>
